name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-13
            target: darwin-x64
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run verify

      - run: npm run package:standalone

      - name: Check target
        shell: bash
        run: |
          actual="$(node -p "process.platform + '-' + process.arch")"
          test "$actual" = "${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: flow-cli-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                sha256sum "$file" | sed 's#  .*/#  #'
              done > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            $(find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) | sort) \
            checksums.txt \
            --title "Flow CLI ${GITHUB_REF_NAME}" \
            --notes "Standalone Flow CLI release ${GITHUB_REF_NAME}."
